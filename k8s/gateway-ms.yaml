---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-ms-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-ms
  template:
    metadata:
      labels:
        app: gateway-ms
    spec:
      containers:
        - name: gateway-ms
          image: localhost/gateway-ms:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: meetbase-config
            - secretRef:
                name: meetbase-secrets

---
apiVersion: v1
kind: Service
metadata:
  name: gateway-ms-service
spec:
  type: NodePort
  selector:
    app: gateway-ms
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30083  # Port accessible from web browser (localhost:30000)