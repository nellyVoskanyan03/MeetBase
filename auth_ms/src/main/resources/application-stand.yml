server:
  port: 8083
  shutdown: graceful

management:
  endpoints:
    web:
      base-path: "/"
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 86400000

spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s
  application:
    name: auth-service
  flyway:
    enabled: true
    baseline-on-migrate: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: WARN