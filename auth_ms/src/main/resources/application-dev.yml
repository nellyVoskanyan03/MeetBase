server:
  port: 8083

application:
  security:
    jwt:
      # Keep local for easy IDE "Play" button usage
      secret-key:
      expiration: 86400000

spring:
  application:
    name: auth-service

  datasource:
    # Points to localhost:5433 because your compose maps auth-db there
    url: jdbc:postgresql://localhost:5433/authdb
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG