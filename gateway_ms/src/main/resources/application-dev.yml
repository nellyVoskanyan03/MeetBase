server:
  port: 8000

application:
  security:
    jwt:
      secret-key:

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/users/**, /users/**

        - id: meet-service
          uri: http://localhost:8080
          predicates:
            - Path=/meets/**